{% extends "base.html" %}
{% block title %}Nueva asignación · Sistema Empresa{% endblock %}
{% block content %}
<div class="ledger-head"><h2>Asignar empleado a proyecto</h2></div>
<form class="card-form" method="post">
  <div class="field-grid">
    <label class="field">
      <span>Empleado</span>
      <select name="nss" required>
        {% for e in empleados %}
          <option value="{{ e[0] }}">{{ e[1] }} {{ e[2] }} ({{ e[0] }})</option>
        {% endfor %}
      </select>
    </label>
    <label class="field">
      <span>Proyecto</span>
      <select name="proyecto" required>
        {% for p in proyectos %}
          <option value="{{ p[0] }}">{{ p[1] }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="field">
      <span>Horas asignadas</span>
      <input type="number" step="0.5" name="horas" required>
    </label>
  </div>
  <p class="form-hint">Si el empleado ya tiene horas registradas en ese proyecto, se actualizarán con este valor.</p>
  <div class="form-actions">
    <a class="btn btn-ghost" href="{{ url_for('asignaciones_list') }}">Cancelar</a>
    <button class="btn btn-primary" type="submit">Guardar asignación</button>
  </div>
</form>
{% endblock %}
